<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Terminal boot loading screen example</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #000000;
      color: rgba(243, 241, 236, 0.76);
      font-family: "Cascadia Mono", "Cascadia Code", Consolas, "Courier New", monospace;
      font-size: 0.92rem;
      letter-spacing: 0;
    }

    .node-boot-terminal {
      display: grid;
      gap: 0.28rem;
      min-width: min(18rem, calc(100vw - 3rem));
      padding: 1rem 1.1rem;
      border: 1px solid rgba(90, 219, 255, 0.22);
      background: rgba(4, 8, 12, 0.78);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 0 28px rgba(90, 219, 255, 0.14);
    }

    .node-boot-line {
      display: block;
      width: max-content;
      max-width: 100%;
      overflow: hidden;
      white-space: nowrap;
      text-shadow: 0 0 14px rgba(90, 219, 255, 0.32);
    }

    .node-boot-line-app {
      color: rgba(120, 238, 255, 0.92);
    }

    .node-boot-prompt {
      display: inline-block;
    }

    .node-boot-command {
      display: inline-block;
      width: 0;
      margin-left: 1ch;
      overflow: hidden;
      vertical-align: bottom;
      animation: node-boot-command-type 420ms steps(8, end) 220ms both;
    }

    .node-boot-line-loading {
      color: rgba(243, 241, 236, 0.82);
      animation: node-boot-line-reveal 500ms steps(17, end) 680ms both;
    }

    .node-boot-line-loading::after {
      content: "";
      display: inline-block;
      width: 0.55ch;
      height: 1em;
      margin-left: 0.35ch;
      vertical-align: -0.12em;
      background: rgba(120, 238, 255, 0.86);
      animation: node-boot-cursor-blink 1000ms steps(1, end) infinite;
      animation-delay: var(--node-boot-cursor-delay, 0ms);
    }

    .node-boot-dot {
      color: rgba(243, 241, 236, 0.56);
      animation: node-boot-dot-pulse 500ms steps(1, end) infinite;
    }

    .node-boot-dot:nth-child(2) {
      animation-delay: 100ms;
    }

    .node-boot-dot:nth-child(3) {
      animation-delay: 200ms;
    }

    @keyframes node-boot-line-reveal {
      from { clip-path: inset(0 100% 0 0); }
      to { clip-path: inset(0 0 0 0); }
    }

    @keyframes node-boot-command-type {
      from { width: 0; }
      to { width: 8ch; }
    }

    @keyframes node-boot-cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @keyframes node-boot-dot-pulse {
      0%, 32% { opacity: 0.28; }
      33%, 100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="node-boot-terminal" aria-label="Terminal boot loading screen example">
    <span class="node-boot-line node-boot-line-app">
      <span class="node-boot-prompt">app:</span><span class="node-boot-command">sandbox~</span>
    </span>
    <span class="node-boot-line node-boot-line-loading">
      loading interface <span class="node-boot-dot">.</span> <span class="node-boot-dot">.</span> <span class="node-boot-dot">.</span>
    </span>
  </div>
</body>
</html>
